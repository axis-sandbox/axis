name: CI

on:
  push:
    branches: [main, develop, "users/**"]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Format and clippy always run (fast, catch style issues on all changes).
  format:
    name: Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check || true  # advisory

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings || true  # advisory, don't block

  # Build and test jobs skip on docs-only changes.
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'policies/**'
              - 'data/**'
              - '.github/workflows/ci.yml'

  test-linux:
    name: Test (Linux)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Unit & integration tests
        run: cargo test

      - name: Policy validation
        run: |
          ./target/release/axis policy validate policies/minimal.yaml
          ./target/release/axis policy validate policies/coding-agent.yaml
          ./target/release/axis policy validate policies/gpu-agent.yaml

      - name: Success metrics
        run: ./target/release/success-metrics

      - name: Daemon e2e test
        run: bash e2e/linux/test_e2e_daemon.sh

      - name: Agent safety tests
        run: bash e2e/agents/test_agents.sh --platform linux

  test-windows:
    name: Test (Windows native)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Unit tests
        run: cargo test

      - name: Policy validation
        run: |
          .\target\release\axis.exe policy validate policies\minimal.yaml
          .\target\release\axis.exe policy validate policies\coding-agent.yaml
          .\target\release\axis.exe policy validate policies\gpu-agent.yaml

      - name: Agent policy validation
        run: |
          Get-ChildItem policies\agents\*.yaml | ForEach-Object {
            .\target\release\axis.exe policy validate $_.FullName
          }
        shell: pwsh

      - name: Agent safety tests
        run: powershell -ExecutionPolicy Bypass -File e2e\agents\test_agents.ps1 -AxisBin .\target\release\axis.exe
        shell: pwsh
