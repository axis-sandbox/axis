version: 1
name: agent-opencode

# OpenCode — multi-provider TUI coding agent.

filesystem:
  read_only:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /sbin
    - /etc
    - /System
    - /Library
    - /Applications
  read_write:
    - "{workspace}"
    - "{tmpdir}"
    - "~/.axis"
    - "~/.opencode"
    - "~/.config"
    - "~/.local/share/opencode"
  deny:
    - "~/.ssh"
    - "~/.gnupg"
    - "~/.aws"
    - "~/.kube"
    - "~/.docker"

process:
  max_processes: 128
  max_memory_mb: 16384
  cpu_rate_percent: 90
  timeout_sec: 600

network:
  mode: proxy
  policies:
    - name: llm-api
      endpoints:
        - host: "api.anthropic.com"
          port: 443
        - host: "api.openai.com"
          port: 443
        - host: "generativelanguage.googleapis.com"
          port: 443
    - name: github
      endpoints:
        - host: "api.github.com"
          port: 443
        - host: "github.com"
          port: 443
    - name: packages
      endpoints:
        - host: "registry.npmjs.org"
          port: 443
        - host: "pypi.org"
          port: 443
        - host: "files.pythonhosted.org"
          port: 443
