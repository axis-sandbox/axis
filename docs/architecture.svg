<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6B7280"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#059669"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#FAFBFC" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1F2937">AXIS Architecture</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#6B7280">Agent eXecution Isolation Substrate</text>

  <!-- ═══ Sandbox boundary ═══ -->
  <rect x="30" y="75" width="520" height="440" rx="16" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" stroke-dasharray="8,4" filter="url(#shadow)"/>
  <text x="50" y="100" font-size="13" font-weight="600" fill="#92400E">Sandbox (per agent)</text>
  <text x="50" y="115" font-size="10" fill="#B45309">Landlock · seccomp · Seatbelt · AppContainer</text>

  <!-- Agent Process -->
  <rect x="60" y="135" width="200" height="90" rx="10" fill="#FFFFFF" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="160" text-anchor="middle" font-size="13" font-weight="600" fill="#4338CA">Agent Process</text>
  <text x="160" y="178" text-anchor="middle" font-size="10" fill="#6B7280">Claude · Codex · Aider</text>
  <text x="160" y="193" text-anchor="middle" font-size="10" fill="#6B7280">OpenClaw · Ironclaw · Goose</text>
  <text x="160" y="210" text-anchor="middle" font-size="9" fill="#9CA3AF">seccomp: 142 syscalls allowed</text>

  <!-- Workspace -->
  <rect x="60" y="240" width="200" height="55" rx="8" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="160" y="262" text-anchor="middle" font-size="11" font-weight="600" fill="#6D28D9">Workspace</text>
  <text x="160" y="278" text-anchor="middle" font-size="9" fill="#7C3AED">~/.axis/agents/&lt;policy&gt;/</text>
  <text x="160" y="290" text-anchor="middle" font-size="8" fill="#9CA3AF">Landlock r/w · Seatbelt subpath</text>

  <!-- Denied paths -->
  <rect x="60" y="308" width="200" height="40" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="160" y="325" text-anchor="middle" font-size="10" font-weight="600" fill="#B91C1C">🔒 Denied</text>
  <text x="160" y="340" text-anchor="middle" font-size="9" fill="#DC2626">~/.ssh · ~/.aws · ~/.gnupg · ~/.kube</text>

  <!-- ═══ Proxy ═══ -->
  <rect x="300" y="135" width="230" height="215" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="415" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#065F46">AXIS Proxy</text>

  <!-- Proxy sub-components -->
  <rect x="315" y="170" width="200" height="30" rx="6" fill="#D1FAE5" stroke="#34D399" stroke-width="1"/>
  <text x="415" y="190" text-anchor="middle" font-size="10" fill="#065F46">OPA Policy Engine (regorus)</text>

  <rect x="315" y="208" width="200" height="30" rx="6" fill="#D1FAE5" stroke="#34D399" stroke-width="1"/>
  <text x="415" y="228" text-anchor="middle" font-size="10" fill="#065F46">TOFU Binary Identity (SHA256)</text>

  <rect x="315" y="246" width="200" height="30" rx="6" fill="#D1FAE5" stroke="#34D399" stroke-width="1"/>
  <text x="415" y="266" text-anchor="middle" font-size="10" fill="#065F46">Credential Leak Detection</text>

  <rect x="315" y="284" width="200" height="30" rx="6" fill="#D1FAE5" stroke="#34D399" stroke-width="1"/>
  <text x="415" y="304" text-anchor="middle" font-size="10" fill="#065F46">L7 TLS Termination</text>

  <rect x="315" y="322" width="96" height="22" rx="5" fill="#059669"/>
  <text x="363" y="337" text-anchor="middle" font-size="9" font-weight="600" fill="white">ALLOW</text>
  <rect x="419" y="322" width="96" height="22" rx="5" fill="#DC2626"/>
  <text x="467" y="337" text-anchor="middle" font-size="9" font-weight="600" fill="white">DENY 403</text>

  <!-- Arrow: Agent → Proxy -->
  <line x1="260" y1="175" x2="298" y2="175" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="278" y="168" text-anchor="middle" font-size="8" fill="#9CA3AF">CONNECT</text>

  <!-- ═══ Outside sandbox ═══ -->

  <!-- Internet / APIs -->
  <rect x="590" y="100" width="280" height="160" rx="12" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="125" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">External Services</text>

  <rect x="610" y="140" width="120" height="28" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="670" y="159" text-anchor="middle" font-size="10" fill="#1D4ED8">api.anthropic.com</text>

  <rect x="740" y="140" width="110" height="28" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="795" y="159" text-anchor="middle" font-size="10" fill="#1D4ED8">api.openai.com</text>

  <rect x="610" y="178" width="120" height="28" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="670" y="197" text-anchor="middle" font-size="10" fill="#1D4ED8">github.com</text>

  <rect x="740" y="178" width="110" height="28" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="795" y="197" text-anchor="middle" font-size="10" fill="#B91C1C">evil.example.com</text>

  <rect x="610" y="216" width="240" height="28" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
  <text x="730" y="235" text-anchor="middle" font-size="10" fill="#166534">inference.local → Local LLM</text>

  <!-- Arrow: Proxy → Internet (allowed) -->
  <line x1="532" y1="190" x2="605" y2="160" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="568" y="168" font-size="8" fill="#059669">✓</text>

  <!-- Arrow: Proxy → blocked (denied) -->
  <line x1="532" y1="210" x2="735" y2="190" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="640" y="208" font-size="8" fill="#DC2626">✗ 403</text>

  <!-- ═══ GPU Isolation ═══ -->
  <rect x="590" y="290" width="280" height="120" rx="12" fill="#FDF4FF" stroke="#A855F7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="315" text-anchor="middle" font-size="13" font-weight="600" fill="#6B21A8">HIP Remote GPU</text>

  <rect x="610" y="325" width="240" height="25" rx="5" fill="#F3E8FF" stroke="#C084FC" stroke-width="1"/>
  <text x="730" y="342" text-anchor="middle" font-size="10" fill="#7E22CE">libamdhip64.so → TCP → hip-worker</text>

  <rect x="610" y="358" width="115" height="22" rx="5" fill="#F3E8FF" stroke="#C084FC" stroke-width="1"/>
  <text x="668" y="373" text-anchor="middle" font-size="9" fill="#7E22CE">VRAM Quotas</text>

  <rect x="735" y="358" width="115" height="22" rx="5" fill="#F3E8FF" stroke="#C084FC" stroke-width="1"/>
  <text x="793" y="373" text-anchor="middle" font-size="9" fill="#7E22CE">API Whitelist</text>

  <rect x="610" y="385" width="240" height="18" rx="4" fill="#A855F7"/>
  <text x="730" y="398" text-anchor="middle" font-size="9" font-weight="600" fill="white">538 HIP APIs · No /dev/kfd access</text>

  <!-- Arrow: sandbox → GPU -->
  <line x1="260" y1="195" x2="260" y2="405" stroke="#A855F7" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="260" y1="405" x2="588" y2="360" stroke="#A855F7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="400" font-size="8" fill="#7E22CE">HIP API proxy (TCP)</text>

  <!-- ═══ AXIS Daemon ═══ -->
  <rect x="30" y="430" width="840" height="80" rx="12" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="455" font-size="13" font-weight="600" fill="#334155">AXIS Daemon (axsd)</text>

  <rect x="50" y="465" width="120" height="25" rx="5" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
  <text x="110" y="482" text-anchor="middle" font-size="9" fill="#475569">Sandbox Manager</text>

  <rect x="180" y="465" width="110" height="25" rx="5" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
  <text x="235" y="482" text-anchor="middle" font-size="9" fill="#475569">Policy Hot-Reload</text>

  <rect x="300" y="465" width="100" height="25" rx="5" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
  <text x="350" y="482" text-anchor="middle" font-size="9" fill="#475569">Inference Mgr</text>

  <rect x="410" y="465" width="110" height="25" rx="5" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
  <text x="465" y="482" text-anchor="middle" font-size="9" fill="#475569">GPU Worker Mgr</text>

  <rect x="530" y="465" width="90" height="25" rx="5" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
  <text x="575" y="482" text-anchor="middle" font-size="9" fill="#475569">Health :18517</text>

  <rect x="630" y="465" width="100" height="25" rx="5" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
  <text x="680" y="482" text-anchor="middle" font-size="9" fill="#475569">OCSF Audit Log</text>

  <rect x="740" y="465" width="110" height="25" rx="5" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
  <text x="795" y="482" text-anchor="middle" font-size="9" fill="#475569">Agent Containment</text>

  <!-- ═══ CLI ═══ -->
  <rect x="30" y="530" width="840" height="70" rx="12" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="50" y="555" font-size="13" font-weight="600" fill="#374151">CLI</text>

  <rect x="90" y="545" width="65" height="22" rx="5" fill="#1F2937"/>
  <text x="122" y="560" text-anchor="middle" font-size="9" font-weight="600" fill="white">axis run</text>

  <rect x="165" y="545" width="80" height="22" rx="5" fill="#1F2937"/>
  <text x="205" y="560" text-anchor="middle" font-size="9" font-weight="600" fill="white">axis install</text>

  <rect x="255" y="545" width="80" height="22" rx="5" fill="#1F2937"/>
  <text x="295" y="560" text-anchor="middle" font-size="9" font-weight="600" fill="white">axis claude</text>

  <rect x="345" y="545" width="70" height="22" rx="5" fill="#1F2937"/>
  <text x="380" y="560" text-anchor="middle" font-size="9" font-weight="600" fill="white">axis logs</text>

  <rect x="425" y="545" width="80" height="22" rx="5" fill="#1F2937"/>
  <text x="465" y="560" text-anchor="middle" font-size="9" font-weight="600" fill="white">axis create</text>

  <rect x="515" y="545" width="75" height="22" rx="5" fill="#1F2937"/>
  <text x="552" y="560" text-anchor="middle" font-size="9" font-weight="600" fill="white">axis exec</text>

  <rect x="600" y="545" width="95" height="22" rx="5" fill="#1F2937"/>
  <text x="647" y="560" text-anchor="middle" font-size="9" font-weight="600" fill="white">axis model pull</text>

  <rect x="705" y="545" width="70" height="22" rx="5" fill="#1F2937"/>
  <text x="740" y="560" text-anchor="middle" font-size="9" font-weight="600" fill="white">axis list</text>

  <!-- Platform badges -->
  <rect x="30" y="570" width="60" height="18" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="60" y="583" text-anchor="middle" font-size="8" font-weight="600" fill="#92400E">Linux</text>

  <rect x="95" y="570" width="60" height="18" rx="4" fill="#E0E7FF" stroke="#6366F1" stroke-width="1"/>
  <text x="125" y="583" text-anchor="middle" font-size="8" font-weight="600" fill="#4338CA">macOS</text>

  <rect x="160" y="570" width="65" height="18" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="192" y="583" text-anchor="middle" font-size="8" font-weight="600" fill="#1E40AF">Windows</text>

  <text x="240" y="584" font-size="9" fill="#6B7280">0.6ms startup · 59K OPA/sec · 1.6MB per sandbox · No admin · Apache 2.0</text>

  <!-- SSH key scoping indicator -->
  <rect x="60" y="360" width="200" height="35" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="160" y="378" text-anchor="middle" font-size="10" font-weight="600" fill="#065F46">🔑 SSH Key Scoping</text>
  <text x="160" y="390" text-anchor="middle" font-size="8" fill="#059669">per-key · per-host · generated config</text>

  <!-- Network namespace indicator -->
  <rect x="300" y="360" width="230" height="35" rx="8" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="415" y="378" text-anchor="middle" font-size="10" font-weight="600" fill="#9A3412">🌐 Network Namespace</text>
  <text x="415" y="390" text-anchor="middle" font-size="8" fill="#C2410C">veth pair · iptables · bypass detection</text>
</svg>
